<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twitter</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="wrapper">
    Original : <a class="original" href="original.png">Click here</a>
    <div class="tweet">
      <div class="tweet__header">
        <div class="profile-image tweet__profile-image">
          <img src="images/deiter.jpg" alt="Dieter DP">
        </div>
        <div class="user-details tweet__user-details">
          <p class="user-handle">
            <a href="#">Dieter Bohn</a>
            <img class="verified-status" src="images/correct.png" alt="Verified">
          </p>
          <p class="user-name">
            <a href="#">@backlon</a>
          </p>
        </div>
        <div class="tweet_more-btn">
          <img src="images/down.png" alt="Down">
        </div>
      </div>
      <div class="tweet-details tweet_tweet-details">
        <div class="tweet-details__tweet-text">
          <span>
            You either die a hero or live long enough to ...have two entirely different UIs for doing the same thing
            along with compatibility issues.
          </span>
        </div>
        <div class="tweet-details__tweet-multimedia">
          <div class="tweet-details__image">
            <img src="images/t1.jpeg" alt="Image1">
          </div>
          <div class="tweet-details__image">
            <img src="images/t2.jpeg" alt="Image2">
          </div>
        </div>
        <div class="tweet-details__tweet-origin-metadata">
          <span>
            3:33 AM · Jul 22, 2020 from <a href="#">Oakland, CA </a> · <a href="#"> Twitter for iPhone</a>
          </span>
        </div>
      </div>
      <div class="tweet-current-status tweet-details__tweet-current-status">
        <div class="tweet-comment-retweet tweet-current-status__tweet-comment-retweet">
          <span><span class="tweet-comment-retweet_text-white">41</span>Retweets and Comments</span>
        </div>
        <div class="tweet-likes">
          <span><span class="tweet-comment-retweet_text-white">788</span> Likes</span>
        </div>
      </div>
      <div class="tweet-actions tweet__tweet-actions">
        <div class="tweet-actions__comment">
          <img src="images/comment_t.png" alt="Comment" title="Comment">
        </div>
        <div class="tweet-actions__retweet">
          <img src="images/retweet.png" alt="Retweet" title="Retweet">
        </div>
        <div class="tweet-actions__heart">
          <img src="images/heart.png" alt="Heart" title="Heart">
        </div>
        <div class="tweet-actions__share">
          <img src="images/share.png" alt="Share" title="Share">
        </div>
      </div>
    </div>

  </div>
</body>

</html>
