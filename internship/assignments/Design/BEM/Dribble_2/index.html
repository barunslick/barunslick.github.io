<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dribble</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="wrapper">
    <p class="original">Original: <a href="dribble.jpg">Click here</p>
    <ul class="popular-posts">
      <li class="post-holder">
        <div class="post-holder__showcase">
          <div class="image-post-holder post-holder__image-post">
            <img class="image-post" src="images/dribble1.png" alt="Showcase1">
            <img class="post-holder__thumbnail" src="images/gif.png" alt="Gif" srcset="">
          </div>
        </div>
        <div class="post-holder__post-details">
          <div class="user-info post-holder__user-info">
            <div class="post-holder__user-img-name">
              <img src="images/user2.jpeg" alt="User Image">
              <span class="user-name">Bhavna Khasyab</span>
            </div>
          </div>
          <div class="post-status post-holder__post-status">
            <div class="comment-showcase post-status__comment-showcases">
              <img class="comment-icon" src="images/comment.png" alt="Comment">
              <span class="comment-count">12</span>
            </div>
            <div class="like-showcase post-status__like-showcase">
              <img class="like-icon" src="images/love.png" alt="Likes">
              <span class="like-count">12</span>
            </div>
          </div>
        </div>
      </li>

      <li class="post-holder">
        <div class="post-holder__showcase">
          <div class="image-post-holder post-holder__image-post">
            <img class="image-post" src="images/dribble2.png" alt="Showcase2">
          </div>
        </div>
        <div class="post-holder__post-details">
          <div class="user-info post-holder__user-info">
            <div class="post-holder__user-img-name">
              <img src="images/user3.jpeg" alt="User Image">
              <span class="user-name">Markus Magnuson</span>
            </div>
          </div>
          <div class="post-status post-holder__post-status">
            <div class="comment-showcase post-status__comment-showcases">
              <img class="comment-icon" src="images/comment.png" alt="Comment">
              <span class="comment-count">10</span>
            </div>
            <div class="like-showcase post-status__like-showcase">
              <img class="like-icon" src="images/love.png" alt="Likes">
              <span class="like-count">8</span>
            </div>
          </div>
        </div>
      </li>

      <li class="post-holder">
        <div class="post-holder__showcase">
          <div class="image-post-holder post-holder__image-post">
            <img class="image-post" src="images/dribble3.png" alt="Showcase3">
          </div>
        </div>
        <div class="post-holder__post-details">
          <div class="user-info post-holder__user-info">
            <div class="post-holder__user-img-name">
              <img src="images/user4.jpeg" alt="User Image">
              <span class="user-name">Eric Hoffman</span>
            </div>
          </div>
          <div class="post-status post-holder__post-status">
            <div class="comment-showcase post-status__comment-showcases">
              <img class="comment-icon" src="images/comment.png" alt="Comment">
              <span class="comment-count">15</span>
            </div>
            <div class="like-showcase post-status__like-showcase">
              <img class="like-icon" src="images/love.png" alt="Likes">
              <span class="like-count">6</span>
            </div>
          </div>
        </div>
      </li>

      <li class="post-holder">
        <div class="post-holder__showcase">
          <div class="image-post-holder post-holder__image-post">
            <img class="image-post" src="images/dribble4.png" alt="Showcase4">
            <img class="post-holder__thumbnail" src="images/minimize.png" alt="minimize">
          </div>
        </div>
        <div class="post-holder__post-details">
          <div class="user-info post-holder__user-info">
            <div class="post-holder__user-img-name">
              <img src="images/nat-geo.jpg" alt="User Image">
              <span class="user-name">John Dinges</span>
            </div>
          </div>
          <div class="post-status post-holder__post-status">
            <div class="comment-showcase post-status__comment-showcases">
              <img class="comment-icon" src="images/comment.png" alt="Comment">
              <span class="comment-count">20</span>
            </div>
            <div class="like-showcase post-status__like-showcase">
              <img class="like-icon" src="images/love.png" alt="Likes">
              <span class="like-count">20</span>
            </div>
          </div>
        </div>
      </li>
    </ul>
  </div>
</body>
</html>
