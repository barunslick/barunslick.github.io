<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Youniverse</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
        <link href='http://fonts.googleapis.com/css?family=Lato&subset=latin,latin-ext' rel='stylesheet' type='text/css'>
        <link rel="stylesheet" type="text/css" href="css/reset.css"/>
        <link rel="stylesheet" type="text/css" href="css/layout.css"/>
        <link rel="stylesheet" type="text/css" href="css/style.css"/>
        <script src="https://kit.fontawesome.com/c9fbd5acb3.js" crossorigin="anonymous"></script>
    </head>
    
    <body>
        <div class = "full-content-wrapper">
            <div class = "header">
                <div class = "content-holder">
                    <div class= "top-header clearfix">
                        <div class = "logo left">
                            <a href = "#" title = "Logo"><img src = "images/logo.png" alt = "Logo"></a>
                        </div>
                        <div class = "side-bar right">
                            <div class= "search">
                                <button><i class="fas fa-search"></i></button>
                            </div>
                            <div class = "cart">
                                <button><i class="fas fa-shopping-cart"></i></button>
                                <span>00<sup>ITEMS</sup></span>
                                <div class = "notification-badge">
                                    <span>1</span>
                                </div>
                            </div>
                            <div class = "hamburger-menu">
                                <button><i class="fas fa-bars"></i></button>
                            </div>
                        </div>
                    </div>
                   
                </div>
            </div>
            <div class = "search-bar">
                <div class = "content-holder">
                    <form method= "POST">
                        <input type="search" placeholder = "Search YouUniverse">
                        <button><i class="fas fa-search"></i></button>
                    </form>
                </div>
            </div>
            <div class = "featured-product">
                <div class = "content-holder">
                    <div class = "middle-container">
                        <div class= "left-arrow">
                            <a href= "#" title="Swipe Left"></a>
                        </div>
                        <div class="right-arrow">
                            <a href= "#" title ="Swipe Right"></a>
                        </div>
                        <div class= "featured-text clearfix">
                            <div class= "left">
                                <div class = "inside-text">
                                    <span>Featured Products</span>
                                </div>
                            </div>
                            <div class= "right">
                                <div class="know-more">
                                    More <b>Details</b>
                                    <div class= "outside-arrow">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class= "main-section">
                            <div class= "details">
                                <ul>
                                    <li>   
                                        <div class = "detail-icon">
                                            <i class="fas fa-couch"></i>
                                        </div>
                                        <div class= "sub-details">
                                            <p>Davis Furniture</p>
                                            <p class= "extra-detail">Furniture Collection 2015</p>
                                        </div>
                                    </li>
                                    <li>
                                        <div class = "detail-icon">
                                            <i class="fas fa-tags"></i>
                                        </div>
                                        <div class= "sub-details">
                                            <p>Starting Price:</p>
                                            <p class= "extra-detail">$399.00</p>
                                        </div>
                                    </li>
                                    <li>
                                        <div class = "detail-icon">
                                            <i class="fas fa-swatchbook"></i>
                                        </div>
                                        <div class= "sub-details">
                                            <p>Color Alternatives:</p>
                                            <p class= "extra-detail">Brown, Black, White </p>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                            <div class = "temp-more">
                                <span>Details</span>
                                <div class= "temp-icon">
                                    <i class="fas fa-arrow-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class= "banner">
                <div class= "content-holder">
                        <ul>
                            <li><a href= "#" title = "Home">HOME</a></li>
                            <li><a href= "#" title = "About Us">ABOUT US</a></li>
                            <li><a href= "#" title = "About Us">OUR TEAM</a></li>
                            <li><a href= "#" title = "About Us">PORTFOLIO</a></li>
                            <li><a href= "#" title = "About Us">OUR BLOG</a></li>
                            <li><a href= "#" title = "About Us">OUR PRODUCTS</a></li>
                            <li><a href= "#" title = "About Us">LASTEST COLLECTIONS</a></li>
                            <li><a href= "#" title = "About Us"><i class="fas fa-arrow-right"></i></a></li>
                        </ul>
                </div>
            </div>
        </div>
    </body>
    
</html>
