<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Youniverse</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
        <link rel="stylesheet" type="text/css" href="css/reset.css"/>
        <link rel="stylesheet" type="text/css" href="css/layout.css"/>
        <link rel="stylesheet" type="text/css" href="css/style.css"/>
        <script src="https://kit.fontawesome.com/c9fbd5acb3.js" crossorigin="anonymous"></script>
    </head>
    
    <body>
        <div class = "full-content-wrapper">
            <div class = "header">
                <div class = "content-holder">
                    <div class= "top-header clearfix">
                        <div class = "logo left">
                            <a href = "#" title = "Logo"><img src = "images/logo.png" alt = "Logo"></a>
                        </div>
                        <div class = "side-bar right">
                            <div class= "search">
                                <button><i class="fas fa-search"></i></button>
                            </div>
                            <div class = "cart">
                                <button><i class="fas fa-shopping-cart"></i></button>
                                <div class = "notification-badge">
                                    <span>1</span>
                                </div>
                            </div>
                            <div class = "hamburger-menu">
                                <button><i class="fas fa-bars"></i></button>
                            </div>
                        </div>
                    </div>
                   
                </div>
            </div>
            <div class = "search-bar">
                <div class = "content-holder">
                    <form method= "POST">
                        <input type="search" placeholder = "Search YouUniverse">
                        <button><i class="fas fa-search"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </body>
    
</html>
