<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class= "wrapper" style= "text-align: center; font-family: Roboto, Arial, Helvetica;"> <!-- This wrapper is just for visual purpose of keeping two divs in center and style is given inline cause its not part of carousal-->
        <h2>Two of my Favourite Countries</h2>
        <div class = "carousel-container one">
            <div class = "carousel-image-wrapper clearfix">
                <img src="images/c1.jpg" title = "Monestry">
                <img src="images/c2.jpg" title = "Mountains">
                <img src="images/c3.jpg" title = "Girl holding a goat">
                <img src="images/c4.jpg" title = "Temple">
                <img src="images/c5.jpg" title = "Old Shop In Kathmandu">
            </div>
        </div>
        <div class = "carousel-container two">
            <div class = "carousel-image-wrapper clearfix">
                <img src="images/j1.jpg" title = "Japan">
                <img src="images/j2.jpg" title = "Japan">
                <img src="images/j3.jpg" title = "Japan">
            </div>
        </div>
    </div> 
    <script src="js/script.js"></script>
    <script>
        var myCarousel = C$('.one'); // C$ is shorthand instead of new, by default transition Time = 0.3, holdTime = 4secs
        myCarousel.setTransitionTime (0.7);
        myCarousel.setHoldTime(8);

        var myCarousel = C$('.two'); // everything with default value
    </script>
</body>
</html>
