<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class = "carousel-container one">
        <div class = "carousel-image-wrapper clearfix">
            <img src="images/c1.jpg" title = "Monestry">
            <img src="images/c2.jpg" title = "Mountains">
            <img src="images/c3.jpg" title = "Girl holding a goat">
            <img src="images/c4.jpg" title = "Temple">
            <img src="images/c5.jpg" title = "Old Shop In Kathmandu">
        </div>
    </div>
    <script src="js/script.js"></script>
    <script>
        var myCarousel = C$('.one'); // C$ is shorthand isntead of new, by default transition Time = 0.3, holdTime = 4secs
        myCarousel.setTransitionTime (0.4);
        myCarousel.setHoldTime(5);
        //var myCarousel2 = C$('.two');
    </script>
</body>
</html>
